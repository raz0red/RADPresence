name: Update Homebrew tap

on:
  push:
    tags:
      - 'v*'

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 of release tarball
        id: sha256
        run: |
          URL="https://github.com/raz0red/RADPresence/archive/refs/tags/${{ steps.version.outputs.tag }}.tar.gz"
          SHA=$(curl -fsSL "$URL" | shasum -a 256 | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: raz0red/homebrew-radpresence
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula url and sha256
        env:
          TAG: ${{ steps.version.outputs.tag }}
          SHA: ${{ steps.sha256.outputs.sha256 }}
        run: |
          sed -i "s|url \"https://github.com/raz0red/RADPresence/archive/refs/tags/.*\"|url \"https://github.com/raz0red/RADPresence/archive/refs/tags/${TAG}.tar.gz\"|" Formula/radpresence.rb
          sed -i "s|sha256 \"[0-9a-f]*\"|sha256 \"${SHA}\"|" Formula/radpresence.rb

      - name: Commit and push
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/radpresence.rb
          git commit -m "radpresence ${TAG}"
          git push
